<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRV Toolkit — Sigrún Þóra</title>
<style>
  :root {
    --bg: #0f1f35;
    --surface: #1e3456;
    --surface2: #243f6a;
    --border: #2d4a72;
    --text: #e8f4fd;
    --muted: #8ab4d4;
    --accent: #63d0ff;
    --teal: #38b2ac;
    --teal-light: #81e6d9;
    --green: #48bb78;
    --red: #fc8181;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .gate {
    background: var(--surface);
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #2d7ab5, #38b2ac);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .presenter {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(56,178,172,0.1);
    border: 1px solid rgba(56,178,172,0.25);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.8rem;
    color: var(--teal-light);
    margin-bottom: 28px;
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.8); }
  }

  label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-align: left;
    margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 14px 16px;
    font-size: 1.05rem;
    outline: none;
    letter-spacing: 0.15em;
    transition: border-color 0.2s;
    text-align: center;
    margin-bottom: 14px;
  }

  input[type="password"]:focus { border-color: var(--accent); }
  input[type="password"].error { border-color: var(--red); animation: shake 0.3s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, #2d7ab5, #38b2ac);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.02em;
  }

  .btn:hover { opacity: 0.9; }

  .err-msg {
    font-size: 0.82rem;
    color: var(--red);
    margin-top: 10px;
    min-height: 20px;
    text-align: center;
  }

  .footer-note {
    margin-top: 28px;
    font-size: 0.75rem;
    color: rgba(138,180,212,0.45);
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="gate">
  <div class="logo">💙</div>
  <h1>HRV Biofeedback Toolkit</h1>
  <p class="subtitle">Verkfæri, dagbók og fræðsla frá fyrirlestri um HRV og lífeðlislega aðlögunarfærni</p>

  <div class="presenter">
    <div class="dot"></div>
    Sigrún Þóra · sigrunthora.is
  </div>

  <label for="pw">Lykilorð frá fyrirlestri</label>
  <input type="password" id="pw" placeholder="• • • • • •"
    onkeydown="if(event.key==='Enter') tryEnter()">

  <button class="btn" onclick="tryEnter()">Opna toolkit →</button>

  <div class="err-msg" id="errMsg"></div>

  <p class="footer-note">
    Lykilorðið fékst á fyrirlestri.<br>
    Spurningar? <a href="https://sigrunthora.is" style="color:var(--teal-light)">sigrunthora.is</a>
  </p>
</div>

<script>
  // Settu lykilorðið þitt hér:
  const PASSWORD = "hrv2024";

  function tryEnter() {
    const inp = document.getElementById('pw');
    const err = document.getElementById('errMsg');
    if (inp.value.toLowerCase().trim() === PASSWORD) {
      sessionStorage.setItem('hrv_auth', '1');
      window.location.href = 'toolkit.html';
    } else {
      inp.classList.remove('error');
      void inp.offsetWidth; // reflow for animation
      inp.classList.add('error');
      err.textContent = 'Rangt lykilorð — reyndu aftur';
      inp.value = '';
      inp.focus();
    }
  }
</script>
</body>
</html>
