<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRV Heildarsýn — Allir þættirnir</title>
<style>
  :root {
    --bg: #0f1f35; --surface: #1e3456; --surface2: #243f6a;
    --border: #2d4a72; --text: #e8f4fd; --muted: #8ab4d4;
    --accent: #63d0ff; --teal: #38b2ac;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; padding: 24px;
  }

  /* AUTH */
  .header {
    max-width: 1100px; margin: 0 auto 28px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px; color: var(--muted);
    font-size: 0.85rem; cursor: pointer; text-decoration: none;
    transition: border-color 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .header-text h1 { font-size: 1.45rem; font-weight: 800; }
  .header-text p { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }

  /* LAYOUT */
  .main {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 420px 1fr; gap: 28px;
    align-items: start;
  }

  /* WHEEL */
  .wheel-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  #wheelSvg { width: 360px; height: 360px; cursor: pointer; }

  .sector-path {
    transition: opacity 0.2s, filter 0.2s;
    opacity: 0.85;
  }
  .sector-path:hover { opacity: 1; filter: brightness(1.2); }
  .sector-path.active { opacity: 1; filter: brightness(1.3) drop-shadow(0 0 8px currentColor); }

  .legend {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; transition: border-color 0.2s;
    font-size: 0.8rem;
  }
  .legend-item:hover { border-color: var(--accent); }
  .legend-item.active { border-color: var(--accent); background: rgba(99,208,255,0.08); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* DETAIL PANEL */
  .detail-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px;
    min-height: 500px;
  }

  .empty-state {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    color: var(--muted); gap: 12px; padding: 40px;
  }
  .empty-icon { font-size: 3rem; opacity: 0.4; }
  .empty-state p { font-size: 0.88rem; line-height: 1.6; max-width: 280px; }

  .sector-detail { display: none; animation: fadeIn 0.3s ease; }
  .sector-detail.show { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }

  .detail-header {
    display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .detail-icon-wrap {
    width: 56px; height: 56px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.7rem;
  }
  .detail-header h2 { font-size: 1.25rem; font-weight: 800; margin-bottom: 6px; }
  .impact-row { display: flex; align-items: center; gap: 8px; }
  .impact-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .stars { font-size: 0.9rem; letter-spacing: 1px; }

  .detail-summary {
    font-size: 0.9rem; color: var(--muted); line-height: 1.7;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 12px;
  }

  .factor-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .factor-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .factor-item .fi { font-size: 1.1rem; margin-top: 1px; flex-shrink: 0; }
  .factor-item .ft { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; }
  .factor-item .fd { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

  .tips-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 24px; }
  .tip-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 12px 14px; border-radius: 10px;
  }
  .tip-item .ti { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
  .tip-item .tt { font-size: 0.85rem; line-height: 1.5; }

  .tool-link {
    display: flex; align-items: center; gap: 10px;
    background: rgba(99,208,255,0.06); border: 1px solid rgba(99,208,255,0.2);
    border-radius: 12px; padding: 14px 16px; text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .tool-link:hover { border-color: var(--accent); background: rgba(99,208,255,0.1); }
  .tool-link .tl-icon { font-size: 1.2rem; }
  .tool-link .tl-text { font-size: 0.82rem; color: var(--muted); line-height: 1.4; }
  .tool-link .tl-text strong { color: var(--accent); display: block; margin-bottom: 2px; }

  /* MOBILE */
  @media (max-width: 780px) {
    .main { grid-template-columns: 1fr; }
    #wheelSvg { width: 300px; height: 300px; }
  }
</style>
</head>

// ── DRAW WHEEL ────────────────────────────────────────────────
const svg = document.getElementById('wheelSvg');
const legend = document.getElementById('legend');

function polar(angle, r) {
  const rad = (angle - 90) * Math.PI / 180;
  return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
}

function arcPath(startDeg, endDeg, r1, r2) {
  const s1 = polar(startDeg + GAP_DEG, r1), e1 = polar(endDeg - GAP_DEG, r1);
  const s2 = polar(startDeg + GAP_DEG, r2), e2 = polar(endDeg - GAP_DEG, r2);
  const large = (endDeg - startDeg - GAP_DEG*2) > 180 ? 1 : 0;
  return `M ${s2[0]} ${s2[1]} A ${r2} ${r2} 0 ${large} 1 ${e2[0]} ${e2[1]} L ${e1[0]} ${e1[1]} A ${r1} ${r1} 0 ${large} 0 ${s1[0]} ${s1[1]} Z`;
}

function iconPos(i) {
  const mid = i * 60 + 30;
  return polar(mid, (R_INNER + R_OUTER) / 2);
}

let active = null;

sectors.forEach((s, i) => {
  const start = i * 60, end = (i+1) * 60;
  const mid = start + 30;

  // Arc path
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', arcPath(start, end, R_INNER, R_OUTER));
  path.setAttribute('fill', s.color);
  path.setAttribute('fill-opacity', '0.25');
  path.setAttribute('stroke', s.color);
  path.setAttribute('stroke-width', '1.5');
  path.setAttribute('class', 'sector-path');
  path.setAttribute('id', 'path-'+i);
  path.style.cursor = 'pointer';
  path.addEventListener('click', () => selectSector(i));
  svg.appendChild(path);

  // Icon text
  const [ix, iy] = iconPos(i);
  const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  icon.setAttribute('x', ix);
  icon.setAttribute('y', iy);
  icon.setAttribute('text-anchor', 'middle');
  icon.setAttribute('dominant-baseline', 'central');
  icon.setAttribute('font-size', '22');
  icon.setAttribute('style', 'pointer-events:none;user-select:none');
  icon.textContent = s.icon;
  svg.appendChild(icon);
});

// Center circle
const centerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
centerCircle.setAttribute('cx', cx); centerCircle.setAttribute('cy', cy);
centerCircle.setAttribute('r', R_INNER - 4);
centerCircle.setAttribute('fill', '#1e3456');
centerCircle.setAttribute('stroke', '#2d4a72');
centerCircle.setAttribute('stroke-width', '1.5');
svg.appendChild(centerCircle);

const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
centerText.setAttribute('x', cx); centerText.setAttribute('y', cy - 8);
centerText.setAttribute('text-anchor', 'middle');
centerText.setAttribute('fill', '#63d0ff');
centerText.setAttribute('font-size', '13');
centerText.setAttribute('font-weight', '700');
centerText.setAttribute('font-family', 'Segoe UI, system-ui, sans-serif');
centerText.textContent = 'HRV';
svg.appendChild(centerText);

const centerSub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
centerSub.setAttribute('x', cx); centerSub.setAttribute('y', cy + 9);
centerSub.setAttribute('text-anchor', 'middle');
centerSub.setAttribute('fill', '#8ab4d4');
centerSub.setAttribute('font-size', '9');
centerSub.setAttribute('font-family', 'Segoe UI, system-ui, sans-serif');
centerSub.textContent = 'Smelltu';
svg.appendChild(centerSub);

// Legend
sectors.forEach((s, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.id = 'leg-'+i;
  item.innerHTML = `<div class="legend-dot" style="background:${s.color}"></div><span>${s.icon} ${s.title}</span>`;
  item.addEventListener('click', () => selectSector(i));
  legend.appendChild(item);
});

// ── SELECT SECTOR ─────────────────────────────────────────────
function selectSector(i) {
  const s = sectors[i];

  // Reset all
  sectors.forEach((_, j) => {
    document.getElementById('path-'+j).setAttribute('fill-opacity', '0.25');
    document.getElementById('path-'+j).setAttribute('stroke-width', '1.5');
    document.getElementById('path-'+j).classList.remove('active');
    document.getElementById('leg-'+j).classList.remove('active');
  });

  // Activate
  const path = document.getElementById('path-'+i);
  path.setAttribute('fill-opacity', '0.5');
  path.setAttribute('stroke-width', '2.5');
  path.classList.add('active');
  document.getElementById('leg-'+i).classList.add('active');

  // Render detail
  document.getElementById('emptyState').style.display = 'none';

  const stars = '★'.repeat(s.impact) + '☆'.repeat(5-s.impact);
  const impactLabel = ['','Lítið','Nokkuð','Miðlungs','Mikið','Mjög mikið'][s.impact];

  const factorsHtml = s.factors.map(f => `
    <div class="factor-item">
      <div class="fi">${f.icon}</div>
      <div><div class="ft">${f.title}</div><div class="fd">${f.desc}</div></div>
    </div>`).join('');

  const tipsHtml = s.tips.map(t => `
    <div class="tip-item" style="background:rgba(${hexToRgb(s.color)},0.06);border-radius:10px">
      <div class="ti">${t.icon}</div>
      <div class="tt">${t.text}</div>
    </div>`).join('');

  const toolHtml = s.toolLink ? `
    <div class="section-title" style="margin-top:24px">Tengd verkfæri í toolkit</div>
    <div class="tool-link" onclick="window.location.href='${s.toolLink.href}'">
      <div class="tl-icon">${s.toolLink.icon}</div>
      <div class="tl-text"><strong>${s.toolLink.title}</strong>${s.toolLink.desc}</div>
      <div style="color:var(--accent);margin-left:auto">→</div>
    </div>` : '';

  document.getElementById('detailContent').innerHTML = `
    <div class="sector-detail show">
      <div class="detail-header">
        <div class="detail-icon-wrap" style="background:rgba(${hexToRgb(s.color)},0.15)">${s.icon}</div>
        <div>
          <h2>${s.title}</h2>
          <div class="impact-row">
            <span class="impact-label">Áhrif á HRV:</span>
            <span class="stars" style="color:${s.color}">${stars}</span>
            <span style="font-size:0.78rem;color:${s.color};font-weight:600">${impactLabel}</span>
          </div>
        </div>
      </div>
      <p class="detail-summary">${s.summary}</p>
      <div class="section-title">Þættirnir sem skipta máli</div>
      <div class="factor-list">${factorsHtml}</div>
      <div class="section-title">Hvað get ég gert?</div>
      <div class="tips-list">${tipsHtml}</div>
      ${toolHtml}
    </div>`;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// Auto-select first on load
setTimeout(() => selectSector(0), 400);
</script>
</body>
</html>
